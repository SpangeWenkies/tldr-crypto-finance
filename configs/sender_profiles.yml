profiles:
  default:
    newsletter_name: Generic Newsletter
    section_patterns:
      - "^[A-Z][A-Za-z0-9 &/:-]{2,60}$"
    article_split_min_words: 25
  milk_road:
    sender_matches:
      - milkroad.com
    newsletter_name: Milk Road
    section_patterns:
      - "^\\*?Markets?\\*?$"
      - "^\\*?News\\*?$"
      - "^\\*?Deals\\*?$"
  finimize:
    sender_matches:
      - finimize.com
    newsletter_name: Finimize
    section_patterns:
      - "^Markets$"
      - "^Business$"
      - "^Policy$"

